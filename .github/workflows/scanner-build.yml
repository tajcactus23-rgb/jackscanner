name: Build Scanner APK

on:
  push:
    branches: [scanner-redesign]
  pull_request:
    branches: [scanner-redesign]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: latest
        packages: |
          platforms;android-34
          build-tools;34.0.0

    - name: Accept licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Build Debug APK
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jackscanner-apk
        path: jackscanner/app/build/outputs/apk/debug/*.apk

    - name: Verify APK exists
      run: |
        ls -la jackscanner/app/build/outputs/apk/debug/
        test -f jackscanner/app/build/outputs/apk/debug/*.apk && echo "APK built successfully!" || echo "APK NOT FOUND"
