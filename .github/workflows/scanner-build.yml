name: Build Scanner APK

on:
  push:
    branches: [scanner-redesign]
  pull_request:
    branches: [scanner-redesign]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Debug APK
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jackscanner-apk
        path: jackscanner/jackscanner/app/build/outputs/apk/

    - name: Verify APK exists
      run: |
        ls -la jackscanner/jackscanner/app/build/outputs/apk/lite/debug/
        ls -la jackscanner/jackscanner/app/build/outputs/apk/full/debug/
