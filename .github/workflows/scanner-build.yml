name: Build Scanner APK

on:
  push:
    branches: [scanner-redesign]
  pull_request:
    branches: [scanner-redesign]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Debug APK
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Find APK files
      run: |
        find jackscanner -name "*.apk" -type f 2>/dev/null
        echo "---"
        ls -la jackscanner/jackscanner/app/build/outputs/apk/debug/ 2>/dev/null || echo "Path not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jackscanner-apk
        path: |
          jackscanner/jackscanner/app/build/outputs/apk/debug/*.apk
          jackscanner/app/build/outputs/apk/debug/*.apk

    - name: Verify APK exists
      run: |
        ls -la jackscanner/jackscanner/app/build/outputs/apk/debug/ 2>/dev/null || ls -la jackscanner/app/build/outputs/apk/debug/ 2>/dev/null || echo "Checking other locations..."
        find jackscanner -name "*.apk" -type f 2>/dev/null | head -5
