name: Android Build (Full & Lite)

on:
  push:
    branches: [ lite-version, main, fix/build-improvements, master ]
  workflow_dispatch:

jobs:
  build-full:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build Full Debug APK
      run: cd jackscanner && ./gradlew assembleFullDebug --no-daemon
    - name: Upload Full APK
      uses: actions/upload-artifact@v4
      with:
        name: jackscanner-full-debug
        path: jackscanner/app/build/outputs/apk/full/debug/app-full-debug.apk

  build-lite:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Build Lite Debug APK
      run: cd jackscanner && ./gradlew assembleLiteDebug --no-daemon
    - name: Upload Lite APK
      uses: actions/upload-artifact@v4
      with:
        name: jackscanner-lite-debug
        path: jackscanner/app/build/outputs/apk/lite/debug/app-lite-debug.apk

  build-debug:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x jackscanner/gradlew

    - name: Clean project
      run: cd jackscanner && ./gradlew clean

    - name: Build Full Debug APK
      run: cd jackscanner && ./gradlew assembleFullDebug --stacktrace

    - name: Build Lite Debug APK
      run: cd jackscanner && ./gradlew assembleLiteDebug --stacktrace

    - name: Upload All Debug APKs
      uses: actions/upload-artifact@v4
      with:
        name: debug-apks
        path: jackscanner/app/build/outputs/apk/*/debug/*.apk
        if-no-files-found: error

  release:
    needs: [build-full, build-lite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4
    
    - name: Download Full APK
      uses: actions/download-artifact@v4
      with:
        name: jackscanner-full-debug
        path: ./apks
    
    - name: Download Lite APK
      uses: actions/download-artifact@v4
      with:
        name: jackscanner-lite-debug
        path: ./apks
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./apks/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
