name: Build iOS/macOS Apps

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      certificate:
        description: 'Base64 encoded Apple certificate'
        required: false
      profile:
        description: 'Base64 encoded provisioning profile'
        required: false

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pyinstaller bleak
        
    - name: Build EXE (JackScanner)
      run: |
        pyinstaller --onefile --name jackscanner --console jackscanner.py --distpath ./osx/jackscanner --workpath ./build/jackscanner --specpath .
        
    - name: Build EXE (AxonBleeder)
      run: |
        pyinstaller --onefile --name axonbleeder --console axonbleeder.py --distpath ./osx/axonbleeder --build ./build/axonbleeder --specpath .
        
    - name: Upload macOS builds
      uses: actions/upload-artifact@v4
      with:
        name: macos-builds
        path: |
          osx/**/*.exe
          
  build-ios:
    runs-on: macos-latest
    needs: build-macos
    if: inputs.certificate != ''
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create Keychain
      run: |
        keychain=$HOME/app-signing.keychain
        security create-keychain -p "" $keychain
        security set-keychain-settings -lut 21600 $keychain
        security unlock-keychain -p "" $keychain
        
    - name: Import Certificate
      run: |
        echo "${{ inputs.certificate }}" | base64 --decode -o certificate.p12
        security import certificate.p12 -P "" -A -t cert -f pkcs12 -k $HOME/app-signing.keychain
        security list-keychain -d user -s $HOME/app-signing.keychain
        
    - name: Setup Ruby for fastlane
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        
    - name: Install fastlane
      run: |
        sudo gem install fastlane
        
    - name: Build IPA
      run: |
        mkdir -p ios/JackScanner
        fastlane build \
          workspace: ios/JackScanner.xcworkspace \
          scheme: JackScanner \
          configuration: Debug \
          output_name: JackScanner.ipa
      env:
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: |
          ios/**/*.ipa
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ios/**/*.ipa
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}