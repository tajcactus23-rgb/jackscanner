name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pyinstaller bleak py2app
        
    - name: Build App (JackScanner)
      run: |
        py2mac-jackscanner jackscanner.py --destpath ./osx/JackScanner.app
      shell: python
      
    - name: Build App (AxonBleeder)
      run: |
        py2mac-axonbleeder axonbleeder.py --destpath ./osx/AxonBleeder.app
      shell: python
        
    - name: Upload Apps
      uses: actions/upload-artifact@v4
      with:
        name: macos-apps
        path: |
          osx/**/*.app
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          osx/**/*.app
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}