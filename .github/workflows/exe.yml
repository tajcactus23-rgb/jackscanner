name: Build Python EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install pyinstaller bleak
        
    - name: Build EXE (JackScanner)
      run: |
        pyinstaller --onefile --name jackscanner --console jackscanner.py --distpath ./exe/jackscanner --workpath ./build/jackscanner --specpath .
        
    - name: Build EXE (AxonBleeder)
      run: |
        pyinstaller --onefile --name axonbleeder --console axonbleeder.py --distpath ./exe/axonbleeder --build ./build/axonbleeder --specpath .
        
    - name: Upload EXEs
      uses: actions/upload-artifact@v4
      with:
        name: windows-exes
        path: |
          exe/**/*.exe
          
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          exe/**/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}