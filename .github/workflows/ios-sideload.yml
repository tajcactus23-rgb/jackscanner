name: Build iOS IPA (Sideloadly)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Show Xcode
      run: |
        xcode-select --print-path
        xcodebuild -version
        
    - name: Setup iOS Simulator
      run: |
        xcodebuild -showsdks
        xcodebuild -runinstruments -tIDLE -dylibIDList 2>&1 || true
        
    - name: Build JackScanner
      run: |
        cd jackscanner
        xcodebuild -scheme JackScanner -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -derivedDataPath build \
          build
        
    - name: Build BlueMeanie  
      run: |
        cd axonbleeder
        xcodebuild -scheme AxonBleeder -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -derivedDataPath build \
          build
        
    - name: Create unsigned IPA
      run: |
        # Create IPA structure for Sideloadly
        mkdir -p ipa-output/Payload
        
        # Note: Needs code signing - this creates Xcode archive
        # For Sideloadly: Open project in Xcode, Product > Archive > Export
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ios-unsigned
        path: |
          jackscanner/build/Build/Products/Debug-iphoneos/
          axonbleeder/build/Build/Products/Debug-iphoneos/