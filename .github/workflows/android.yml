name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Install Gradle
      run: |
        cd $HOME
        curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip -q gradle.zip
        export PATH=$HOME/gradle-8.2/bin:$PATH
        gradle --version
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Generate Gradle Wrapper
      run: |
        export PATH=$HOME/gradle-8.2/bin:$PATH
        export ANDROID_HOME=$HOME/android-sdk
        cd jackscanner
        gradle wrapper --gradle-version 8.2
        cd ../axonbleeder
        gradle wrapper --gradle-version 8.2
        
    - name: Build JackScanner APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        echo "sdk.dir=$ANDROID_HOME" > jackscanner/local.properties
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Build AxonBleeder APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        echo "sdk.dir=$ANDROID_HOME" > axonbleeder/local.properties
        cd axonbleeder
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          jackscanner/app/build/outputs/apk/debug/*.apk
          axonbleeder/app/build/outputs/apk/debug/*.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jackscanner/app/build/outputs/apk/debug/*.apk
          axonbleeder/app/build/outputs/apk/debug/*.apk
        name: BlueMeanie Scanner Release
        body: |
          ## BlueMeanie BLE Scanner for Axon/TASER Devices
          
          ### Apps Included
          - **JackScanner** - Original BLE scanner
          - **BlueMeanie** - Branded Axon detector
          
          ### Detection Features
          - MAC OUI: 00:25:DF (Axon), FC:A9:E8, X4G
          - Device Names: AXON_CAMERA, TASER, AXON_BODY
          - Background scanning via foreground service
          - Alert notifications with sound/vibration
          
          ### Install
          - Android: Enable "Install from unknown sources" and install APK
          - iOS: See IOS_INSTALL.md for Sideloadly/AltStore guide
        generate_release_notes: true
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}