name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/wrapper-action@v3
      with:
        gradle-version: 8.2
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Build JackScanner APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        echo "sdk.dir=$ANDROID_HOME" > jackscanner/local.properties
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Build AxonBleeder APK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        echo "sdk.dir=$ANDROID_HOME" > axonbleeder/local.properties
        cd axonbleeder
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: android-apks
        path: |
          jackscanner/app/build/outputs/apk/debug/*.apk
          axonbleeder/app/build/outputs/apk/debug/*.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          jackscanner/app/build/outputs/apk/debug/*.apk
          axonbleeder/app/build/outputs/apk/debug/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}