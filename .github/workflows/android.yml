name: Build Android APK

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
    paths:
      - 'jackscanner/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Run Kotlin Lint
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew ktlintCheck || true

  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Run unit tests
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew test --no-daemon || true

  build-debug:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Build BlueMeanie APK
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: bluemeanie-apk
        path: app/build/outputs/apk/debug/*.apk

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Build Release APK
      run: |
        cd jackscanner
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: bluemeanie-release-apk
        path: jackscanner/app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: jackscanner/app/build/outputs/apk/release/*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}